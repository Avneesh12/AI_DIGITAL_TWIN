<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .container {
      max-width:600px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:10px;
    }
    .btn {
      display:inline-block;
      padding:12px 20px;
      background:#4f46e5;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome to Digital Twin 🚀</h2>
    <p>Hi {{ name }},</p>
    <p>We're excited to have you onboard. Your journey into intelligent systems starts now.</p>

    <a href="{{ frontend_url }}" class="btn">Get Started</a>

    <p style="margin-top:20px;">Let’s build something amazing together.</p>

    <p>— Digital Twin Team</p>
  </div>
</body>
</html>
