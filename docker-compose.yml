version: '3.9'

services:

  # ── FastAPI Application ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app    # Hot-reload in development
    restart: on-failure
    networks:
      - digital_twin_net

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: digital_twin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d digital_twin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - digital_twin_net

  # ── Qdrant Vector DB ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC port
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - digital_twin_net

  # ── Redis (for Celery task queue) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - digital_twin_net

  # ── Celery Worker (optional, for background personality updates) ──────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.personality_updater worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    networks:
      - digital_twin_net

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  digital_twin_net:
    driver: bridge
